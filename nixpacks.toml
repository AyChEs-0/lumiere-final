[phases.setup]
nixPkgs = [
  "php84",
  "php84Extensions.curl",
  "php84Extensions.mbstring",
  "php84Extensions.xml",
  "php84Extensions.dom",
  "php84Extensions.pdo",
  "php84Extensions.pdo_mysql",
  "php84Extensions.tokenizer",
  "php84Extensions.fileinfo",
  "php84Extensions.gd",
  "php84Extensions.intl",
  "php84Extensions.zip",
  "php84Extensions.openssl",
  "php84Extensions.pcre",
  "php84Extensions.session",
  "php84Extensions.json",
  "php84Extensions.ctype",
  "nodejs_22",
]

[phases.install]
cmds = [
  "composer install --optimize-autoloader --no-interaction",
  "npm ci",
  "npm run build",
]

[phases.build]
cmds = [
  "php artisan config:cache",
  "php artisan route:cache",
  "php artisan view:cache",
]

[start]
cmd = "php artisan migrate --force && php artisan storage:link && php artisan serve --host=0.0.0.0 --port=$PORT"
