services:

  app:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
      args:
        DOCROOT: /var/www/html/public
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: "${APP_KEY}"
      APP_URL: "http://localhost:8080"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_DATABASE: "${DB_DATABASE:-lumiere}"
      DB_USERNAME: "${DB_USERNAME:-lumiere}"
      DB_PASSWORD: "${DB_PASSWORD:-secret}"
      QUEUE_CONNECTION: sync
      SESSION_DRIVER: database
      CACHE_STORE: database
      TMDB_API_KEY: "${TMDB_API_KEY:-}"
      SERVICES_MOVIES_API_API_KEY: "${SERVICES_MOVIES_API_API_KEY:-${TMDB_API_KEY:-}}"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-rootsecret}"
      MYSQL_DATABASE: "${DB_DATABASE:-lumiere}"
      MYSQL_USER: "${DB_USERNAME:-lumiere}"
      MYSQL_PASSWORD: "${DB_PASSWORD:-secret}"
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "33060:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootsecret}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

volumes:
  mysql_data:
    driver: local
